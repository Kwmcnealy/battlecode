<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link
      rel="preload"
      href="/brand/battletcg/fonts/JetBrainsMono-Regular.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <script>
      (() => {
        const CRIMSON_GRID_BACKGROUND = "#0a0a0a";
        const themeColorMeta = document.querySelector('meta[name="theme-color"]');
        try {
          window.localStorage.setItem("t3code:theme", "dark");
        } catch {
          // Storage may be unavailable in embedded previews.
        } finally {
          document.documentElement.classList.add("dark");
          document.documentElement.setAttribute("data-mode", "dark");
          document.documentElement.style.backgroundColor = CRIMSON_GRID_BACKGROUND;
          themeColorMeta?.setAttribute("content", CRIMSON_GRID_BACKGROUND);
        }
      })();
    </script>
    <style>
      @font-face {
        font-family: "JetBrains Mono";
        src: url("/brand/battletcg/fonts/JetBrainsMono-Regular.ttf") format("truetype");
        font-display: swap;
        font-style: normal;
        font-weight: 400;
      }

      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        background: #0a0a0a;
        color: #d4d4d4;
        font-family:
          "JetBrains Mono",
          "SFMono-Regular",
          ui-monospace,
          -apple-system,
          BlinkMacSystemFont,
          monospace;
      }

      #boot-shell {
        display: flex;
        min-height: 100%;
        align-items: center;
        justify-content: center;
        background:
          linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          radial-gradient(circle at 50% 0%, rgba(220, 38, 38, 0.22), transparent 36%), #0a0a0a;
        background-size:
          32px 32px,
          32px 32px,
          auto,
          auto;
      }

      #boot-shell-card {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 96px;
        height: 96px;
        border: 1px solid rgba(220, 38, 38, 0.55);
        box-shadow:
          0 0 18px rgba(220, 38, 38, 0.28),
          0 0 42px rgba(59, 130, 246, 0.08);
      }

      #boot-shell-card::before,
      #boot-shell-card::after {
        position: absolute;
        width: 14px;
        height: 14px;
        content: "";
        pointer-events: none;
      }

      #boot-shell-card::before {
        top: -1px;
        left: -1px;
        border-top: 2px solid #dc2626;
        border-left: 2px solid #dc2626;
      }

      #boot-shell-card::after {
        right: -1px;
        bottom: -1px;
        border-right: 2px solid #3b82f6;
        border-bottom: 2px solid #3b82f6;
      }

      #boot-shell-logo {
        width: 64px;
        height: 64px;
        object-fit: contain;
      }
    </style>
    <title>Battle.Code (Alpha)</title>
  </head>
  <body>
    <div id="root">
      <div id="boot-shell">
        <div id="boot-shell-card" aria-label="Battle.Code splash screen">
          <img id="boot-shell-logo" src="/apple-touch-icon.png" alt="Battle.Code" />
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
